- date: "2025"
  title: "A religião e o ainda-não-conhecido: possíveis desdobramentos sobre a formação de professores"
  image: https://ichef.bbci.co.uk/ace/ws/640/cpsprodpb/89ac/live/8244afc0-4d86-11ee-aef7-af0179de8ea1.png.webp
  description: "Defendida no PPGE/UECE, a tese sustenta que a leitura de mundo religiosa que atribui ao desconhecido um caráter místico e transcendente, adentra o campo da educação. Esta que deveria formar para uma leitura imanente da realidade, acaba assumindo o ainda não dominado teórico-conceitualmente como algo transcendente."

- date: "2014"
  title: "Ensino religioso e mistificação da realidade: contribuições a uma crítica ontológica"
  image: https://www.segs.com.br/media/k2/items/cache/fa388bc91247c304ff8ede52cfc012f8_XL.jpg
  description: "Dissertação defendida no PPGE/UECE. O texto sustenta, a partir da análise do reflexo religioso na Estética de Lukács, que elementos característicos da religião adentram a educação por meio do ensino religioso, corroborando a mistificação da realidade."

